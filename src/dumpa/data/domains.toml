# Domain-ownership seed: maps observed hosts to the company/SDK that owns them.
#
# This is NOT a rule bundle (it lives under dumpa.data, not dumpa.rules) and is never
# returned by builtin_bundle_names(). It feeds attribution only.
#
# Curation rules (see claude-plan.md §6):
#   - Every host is a BARE host (no scheme/path/wildcard); each passes validate_host.
#   - NEVER add a SHARED_INFRA host (firebaseio.com, googleapis.com, fbcdn.net,
#     cloudfront.net, *.github.io, byteoversea.com, isnssdk.com, ibytedtos.com, ...).
#     Such hosts attribute only on exact match and must not be claimed by one owner.
#   - `subject` is optional and links a host to a tracker subject in trackers.toml so the
#     attribution pass can attach a domain Location to that exact SDK finding. Omit it when
#     a host is ambiguous between several same-owner SDKs (e.g. facebook.com) — the pass
#     will then NOT cross-attribute.
#
# Shared-infra EXCEPTIONS (tracker subjects deliberately given NO ownership entry because
# their only endpoints are multi-tenant infrastructure):
#   - Firebase Cloud Messaging  -> fcm/firebaseinstallations.googleapis.com (googleapis.com)
#   - Firebase Remote Config    -> firebaseremoteconfig.googleapis.com      (googleapis.com)
#   - Meta Audience Network     -> graph.facebook.com / *.fbcdn.net (fbcdn.net is shared;
#                                  facebook.com is listed subject-less under owner "Meta")

[bundle]
name = "domains"
version = "2026.06.1"
source = "dumpa built-in (curated seed)"
updated = "2026-06-07"

