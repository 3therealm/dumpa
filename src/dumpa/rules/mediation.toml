# Ad-mediation adapter rules (content matchers over dex class paths).
#
# A mediation SDK (AppLovin MAX, ironSource/LevelPlay, Google AdMob mediation) ships a
# per-network *adapter* class so it can orchestrate that network's ads. Detecting the
# adapter class is concrete evidence of one edge in the mediation graph: this mediator
# routes to that network. `mediator` and `network` name the two endpoints; the
# ad-mediation graph (`core.report.mediation_graph`) joins these edges into a per-mediator
# view. `strings` are class-path fragments as they appear in classes*.dex type descriptors.
#
# Curated starter set (mirrors trackers.toml's "curated floor" stance); importer-driven
# expansion of the adapter catalog is future work.

[bundle]
name = "mediation"
version = "2026.06.1"
source = "dumpa built-in (curated)"
updated = "2026-06-09"

# --- AppLovin MAX adapters (com/applovin/mediation/adapters/<Network>MediationAdapter) ---

[[rule]]
kind = "mediation-adapter"
subject = "AppLovin MAX -> Google AdMob adapter"
category = "ad mediation adapter"
mediator = "AppLovin MAX"
network = "Google AdMob"
confidence = "high"
strings = ["com/applovin/mediation/adapters/GoogleMediationAdapter"]

[[rule]]
kind = "mediation-adapter"
subject = "AppLovin MAX -> Vungle / Liftoff adapter"
category = "ad mediation adapter"
mediator = "AppLovin MAX"
network = "Vungle / Liftoff"
