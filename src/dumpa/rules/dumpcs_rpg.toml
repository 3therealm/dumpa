# Ported from DumpExplorer patterns/rpg.json. Selected for the "rpg" category.
[bundle]
name = "dumpcs_rpg"
version = "2026.06.1"
source = "ported from DumpExplorer patterns/rpg.json"
updated = "2026-06-08"
default_targets = ["dump.cs"]

[[rule]]
kind = "dumpcs"
subject = "character-stats"
confidence = "high"
case_insensitive = true
game_types = ["rpg"]
regex = ['(Strength|Dexterity|Intelligence|Wisdom|Constitution|Charisma|Agility|Vitality|Luck|Critical).*((Stat|Value|Attribute|Bonus|Modifier|Calc|Set|Get|Add))']

[[rule]]
kind = "dumpcs"
subject = "health-system"
confidence = "high"
case_insensitive = true
game_types = ["rpg"]
regex = ['(HP|Health|HitPoint).*((Current|Max|Heal|Damage|Regen|Restore|Reduce|Kill|Die|Death|Set|Get|Add))']

[[rule]]
kind = "dumpcs"
subject = "mana-system"
confidence = "high"
case_insensitive = true
game_types = ["rpg"]
regex = ['(MP|Mana|Magic|Energy|Stamina|Focus).*((Current|Max|Regen|Restore|Consume|Cast|Spend|Refill|Set|Get))']

[[rule]]
kind = "dumpcs"
subject = "experience-level"
