# --- manifest-component matchers ---------------------------------------------
# SDKs register fully-qualified activities/services/receivers in the manifest.
# These rules match component class names in the parsed AndroidManifest.xml and so
# add structured manifest-entry evidence (and catch an SDK whose classes live in a
# split/feature module not present in the base dex). Subjects mirror the class-path
# rules above so tracker.scan merges both signals into one finding.

[[rule]]
kind = "tracker"
subject = "Google AdMob / Mobile Ads"
category = "ads"
owner = "Google"
confidence = "high"
manifest_field = "component"
manifest = ['^com\.google\.android\.gms\.ads\.']

[[rule]]
kind = "tracker"
subject = "Meta Audience Network"
category = "ad mediation"
owner = "Meta"
confidence = "high"
manifest_field = "component"
manifest = ['^com\.facebook\.ads\.']

[[rule]]
kind = "tracker"
subject = "Facebook SDK"
category = "social login or sharing"
owner = "Meta"
confidence = "high"
manifest_field = "component"
manifest = ['^com\.facebook\.(FacebookActivity|CustomTabActivity|CustomTabMainActivity)']

[[rule]]
kind = "tracker"
subject = "AppLovin MAX"
