# Tracker / SDK detection rules (content matchers).
#
# Each rule searches for class-path fragments (as they appear in classes*.dex type
# descriptors, e.g. "com/google/firebase/analytics") and/or SDK domains inside the
# dex, native libs, manifest, and resource table. `category` is the tracker
# taxonomy; `owner` is the SDK vendor (the SDK-owner mapping). A package-path hit is
# a strong signal, so most rules are high confidence.
#
# This is a curated starter set. Importing external databases (Exodus Privacy,
# TrackerControl, AppBrain) and `dumpa update-signatures` remain future work.

[bundle]
name = "trackers"
version = "2026.06.1"
source = "dumpa built-in (curated)"
updated = "2026-06-06"

# --- Google ------------------------------------------------------------------

[[rule]]
kind = "tracker"
subject = "Firebase Analytics"
category = "analytics"
owner = "Google"
confidence = "high"
strings = ["com/google/firebase/analytics"]

[[rule]]
kind = "tracker"
subject = "Google Analytics"
category = "analytics"
owner = "Google"
confidence = "high"
strings = ["com/google/android/gms/analytics"]

[[rule]]
kind = "tracker"
subject = "Firebase Crashlytics"
category = "crash reporting"
owner = "Google"
confidence = "high"
strings = ["com/google/firebase/crashlytics", "com/crashlytics/"]

[[rule]]
