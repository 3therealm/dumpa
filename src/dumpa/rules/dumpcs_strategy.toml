case_insensitive = true
game_types = ["strategy"]
regex = ['(Alliance|Guild|Clan|Diplomacy).*((Create|Join|Leave|Invite|Kick|Member|Role|Rank|Leader|Officer|Chat|Message|War|Peace|Treaty|Trade))']

