# Ported from DumpExplorer patterns/strategy.json. Selected for the "strategy" category.
[bundle]
name = "dumpcs_strategy"
version = "2026.06.1"
source = "ported from DumpExplorer patterns/strategy.json"
updated = "2026-06-08"
default_targets = ["dump.cs"]

[[rule]]
kind = "dumpcs"
subject = "resource-production"
confidence = "high"
case_insensitive = true
game_types = ["strategy"]
regex = ['(Resource|Material).*((Produce|Generate|Collect|Gather|Harvest|Mine|Extract|Yield|Rate|PerSecond|PerMinute|Output))']

[[rule]]
kind = "dumpcs"
subject = "resource-storage"
confidence = "high"
case_insensitive = true
game_types = ["strategy"]
regex = ['(Storage|Warehouse|Silo|Barn).*((Capacity|Limit|Max|Current|Add|Remove|IsFull|IsEmpty|Upgrade|Expand))']

[[rule]]
kind = "dumpcs"
subject = "building-system"
confidence = "high"
case_insensitive = true
game_types = ["strategy"]
regex = ['(Building|Structure|Construction).*((Build|Construct|Place|Upgrade|LevelUp|Demolish|Destroy|Move|Rotate|Cost|Time|Speed|Queue|Complete))']

[[rule]]
kind = "dumpcs"
subject = "tech-tree"
confidence = "high"
case_insensitive = true
game_types = ["strategy"]
regex = ['(Tech|Technology|Research).*((Unlock|Tree|Node|Branch|Progress|Complete|Start|Cost|Requirement|Prereq|Prerequisite))']

[[rule]]
