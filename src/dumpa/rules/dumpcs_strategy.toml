subject = "unit-training"
confidence = "high"
case_insensitive = true
game_types = ["strategy"]
regex = ['(Unit|Troop|Soldier|Army).*((Train|Recruit|Hire|Create|Spawn|Queue|Time|Speed|Cost|Capacity|Limit|Max))']

[[rule]]
kind = "dumpcs"
subject = "combat-military"
confidence = "high"
case_insensitive = true
game_types = ["strategy"]
regex = ['(Battle|War|Fight|Combat|Attack).*((Start|Begin|End|Resolve|Calculate|Simulate|Auto|Manual|Result|Victory|Defeat|Loss|Win))']

[[rule]]
kind = "dumpcs"
subject = "map-territory"
