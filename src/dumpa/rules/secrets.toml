# Hardcoded secret / credential detection rules (regex content matchers).
#
# Regex patterns run over dex/native/resources/text. Matches are reported with the
# captured value (capped) as evidence so you can verify; treat them as leads, not
# proof — keys may be test values, third-party, or already revoked. Literal regex
# strings (single-quoted TOML) avoid backslash-escaping surprises.

[bundle]
name = "secrets"
version = "2026.06.2"
source = "dumpa built-in"
updated = "2026-06-10"
# Secrets hide in resources and config assets as well as code.
default_targets = [
    "**/*.dex", "lib/**/*.so", "resources.arsc", "AndroidManifest.xml",
    "**/*.json", "**/*.xml", "**/*.txt", "**/*.js", "**/*.properties", "**/*.cfg",
]

[[rule]]
kind = "secret"
subject = "Google API key"
category = "api-key"
confidence = "high"
regex = ['AIza[0-9A-Za-z_\-]{35}']

[[rule]]
kind = "secret"
subject = "Google OAuth client ID"
category = "api-key"
confidence = "medium"
regex = ['[0-9]+-[0-9A-Za-z_]{20,}\.apps\.googleusercontent\.com']

[[rule]]
kind = "secret"
subject = "AWS access key ID"
category = "api-key"
confidence = "high"
regex = ['AKIA[0-9A-Z]{16}']

[[rule]]
kind = "secret"
subject = "Firebase Realtime Database URL"
category = "cloud endpoint"
confidence = "medium"
regex = ['https://[a-z0-9-]+\.firebaseio\.com']

[[rule]]
kind = "secret"
subject = "Google Cloud Storage URL"
category = "cloud storage"
confidence = "medium"
regex = ['https://storage\.googleapis\.com/[A-Za-z0-9._\-]+']

[[rule]]
kind = "secret"
subject = "Amazon S3 bucket"
category = "cloud storage"
confidence = "medium"
regex = ['[a-z0-9.\-]+\.s3[.\-][a-z0-9\-]*\.amazonaws\.com']

[[rule]]
kind = "secret"
subject = "Slack token"
category = "token"
confidence = "high"
regex = ['xox[baprs]-[0-9A-Za-z-]{10,}']

[[rule]]
kind = "secret"
subject = "Stripe live secret key"
category = "api-key"
confidence = "high"
regex = ['sk_live_[0-9a-zA-Z]{24}']

[[rule]]
kind = "secret"
subject = "JSON Web Token (JWT)"
category = "token"
confidence = "low"
regex = ['eyJ[A-Za-z0-9_\-]{8,}\.eyJ[A-Za-z0-9_\-]{8,}\.[A-Za-z0-9_\-]{8,}']

[[rule]]
kind = "secret"
subject = "Private key block"
category = "private key"
confidence = "high"
regex = ['-----BEGIN (?:RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY-----']

# Analytics / ad-network identifiers. Only prefix-anchored IDs are listed; shapeless
# tokens (Mixpanel/Amplitude 32-hex, Unity/Meta numeric IDs, AppLovin/ironSource keys)
# are omitted deliberately — no distinctive anchor means pure false-positive noise.

[[rule]]
kind = "secret"
subject = "Google Universal Analytics ID"
category = "analytics-id"
confidence = "medium"
regex = ['UA-[0-9]{4,10}-[0-9]{1,4}']

[[rule]]
kind = "secret"
subject = "Google Analytics 4 measurement ID"
category = "analytics-id"
confidence = "medium"
regex = ['G-[A-Z0-9]{10}']

[[rule]]
kind = "secret"
subject = "Google Tag Manager ID"
category = "analytics-id"
confidence = "medium"
regex = ['GTM-[A-Z0-9]{6,8}']

[[rule]]
kind = "secret"
subject = "Firebase / Google mobile app ID"
category = "analytics-id"
confidence = "medium"
regex = ['1:[0-9]{6,}:android:[0-9a-f]{8,}']

[[rule]]
kind = "secret"
subject = "AdMob application ID"
category = "ad-network-id"
confidence = "high"
regex = ['ca-app-pub-[0-9]{16}~[0-9]{10}']

[[rule]]
kind = "secret"
subject = "AdMob ad-unit ID"
category = "ad-network-id"
confidence = "high"
regex = ['ca-app-pub-[0-9]{16}/[0-9]{10}']
